name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci --prefix web

      - name: Lib property tests
        run: |
          node web/src/lib/propagation.test.mjs
          node web/src/lib/temporal.test.mjs
          node web/src/lib/geoAssoc.test.mjs

      - name: Production build
        run: npm run build --prefix web

  backend:
    name: Backend (engine + feeds tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r backend/requirements.txt

      - name: Run test modules
        run: bash scripts/run_backend_tests.sh
