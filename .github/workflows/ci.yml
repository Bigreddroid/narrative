name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci --prefix web

      - name: Lib property tests
        run: npm run test:lib --prefix web

      - name: Component + hook tests (vitest)
        run: npm test --prefix web

      - name: Production build
        run: npm run build --prefix web

  backend:
    name: Backend (engine + feeds tests)
    runs-on: ubuntu-latest

    # A real Postgres (with pgvector) + Redis so migrations are exercised in CI
    # instead of running for the first time on prod boot. pgvector image ships the
    # `vector` extension the first migration's CREATE EXTENSION needs.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: narrative
          POSTGRES_PASSWORD: narrative
          POSTGRES_DB: narrative_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U narrative"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://narrative:narrative@localhost:5432/narrative_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r backend/requirements.txt

      - name: Run migrations (validate schema against a real DB)
        run: alembic -c backend/alembic.ini upgrade head

      - name: Run test modules
        run: bash scripts/run_backend_tests.sh
