[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[[services]]
name = "api"
[services.deploy]
startCommand = "alembic -c backend/alembic.ini upgrade head && gunicorn backend.main:app --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "scheduler"
[services.deploy]
startCommand = "python -m backend.scheduler"

[[services]]
name = "scrape-worker"
[services.deploy]
startCommand = "python -m backend.workers.scrape_worker"

