version: "3.9"

services:
  postgres:
    # pg18 to match the pg_dump that produced scripts/narrative.dump (archive
    # v1.16); an older server's pg_restore cannot read a newer archive header.
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: narrative
      POSTGRES_PASSWORD: narrative
      POSTGRES_DB: narrative
    ports:
      - "5432:5432"
    volumes:
      # pg18 image relocated PGDATA; the volume must mount at
      # /var/lib/postgresql (not /data) or the container exits on startup.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U narrative"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://narrative:narrative@postgres:5432/narrative
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "
        cd /app &&
        alembic -c backend/alembic.ini upgrade head &&
        gunicorn backend.main:app
          --worker-class uvicorn.workers.UvicornWorker
          --workers 2
          --bind 0.0.0.0:8000
          --reload
      "

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://narrative:narrative@postgres:5432/narrative
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m backend.scheduler

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@narrative.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
