services:
  postgres:
    # pg18 to match the pg_dump that produced scripts/narrative.dump (archive
    # v1.16); an older server's pg_restore cannot read a newer archive header.
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: narrative
      POSTGRES_PASSWORD: narrative
      POSTGRES_DB: narrative
    ports:
      - "5432:5432"
    volumes:
      # pg18 image relocated PGDATA; the volume must mount at
      # /var/lib/postgresql (not /data) or the container exits on startup.
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U narrative"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Local LLM runtime. Without this, api/scheduler default OLLAMA_BASE_URL to
  # localhost:11434 which — from inside a container — points at the container
  # itself, so the analyst falls back to templated answers and new events get no
  # LLM consequence-map. Running Ollama as a service makes the app fully working
  # ($0, local) out of one `docker compose up`.
  ollama:
    image: ollama/ollama:latest
    # Not published to the host on purpose: api/scheduler reach it over the
    # internal network (http://ollama:11434), so there's nothing to expose. It
    # also avoids a boot failure on machines already running a native Ollama on
    # :11434 (a common collision) — keeping `docker compose up` truly one-command.
    expose:
      - "11434"
    environment:
      # Keep pulled models resident in memory so the analyst/OSINT don't re-pay
      # the ~14s cold model-load on every call (default is 5m). On the CPU-only
      # demo stack that cold load is a big chunk of perceived latency.
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # `ollama list` talks to the local server; succeeds once `ollama serve` is up.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # One-shot: pull the models the app needs, then exit. llama3.2 = text analyst;
  # llava = vision for /geolocate. Re-running is a fast no-op once the ollama_data
  # volume is warm, so only the first boot pays the download cost. api/scheduler
  # wait for this to complete so a friend/investor never hits a half-loaded model.
  #
  # We drive the pull through ollama's HTTP /api/pull endpoint (via a plain curl
  # image) instead of the `ollama` CLI: current ollama/ollama:latest launches a
  # TUI on `ollama pull`, which aborts in a non-interactive container
  # ("could not open a new TTY") yet exits 0 — silently pulling nothing. The API
  # streams NDJSON and ends with {"status":"success"}, which we assert on so a
  # failed pull actually fails this service (and blocks api/scheduler) instead of
  # masking behind a 0 exit code.
  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    # command is a single-element list (not a bare string) so the whole script
    # reaches `sh -c` as one argument; a bare string is word-split by compose and
    # only its first word becomes the script.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for m in llama3.2 llava; do
          echo "pulling $$m ...";
          curl -sf http://ollama:11434/api/pull -d "{\"name\":\"$$m\"}" | tail -n1 | grep -q '"status":"success"' || { echo "pull failed: $$m"; exit 1; };
        done
        echo 'ollama models ready'
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Optional: a fresh `git clone` has no .env, and the app defaults to a fully
    # keyless local stack (fastembed embeddings + ollama LLM), so it must still
    # boot. required:false lets compose start without a .env instead of erroring.
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://narrative:narrative@postgres:5432/narrative
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    # Self-recover from a crash/OOM instead of leaving the API down.
    restart: unless-stopped
    volumes:
      - .:/app
    command: >
      sh -c "cd /app &&
      alembic -c backend/alembic.ini upgrade head &&
      uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://narrative:narrative@postgres:5432/narrative
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      OLLAMA_BASE_URL: http://ollama:11434
      # Persist the ~1.3 GB bge-large ONNX embedding model to a named volume so
      # it is fetched ONCE, not re-downloaded on every restart (empty default ⇒
      # ephemeral tmp dir under the container FS). Big win now the scheduler
      # restarts more often (restart policy below) and runs a heavier 5-min load.
      FASTEMBED_CACHE_DIR: /app/.fastembed_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    # The scheduler is the memory-heaviest container (loads bge-large + runs 16
    # workers) and previously OOM-died (exit 137) with NO restart policy, leaving
    # the whole pipeline frozen until a manual `docker compose up`. Auto-recover.
    restart: unless-stopped
    volumes:
      - .:/app
      # Persistent embed-model cache (see FASTEMBED_CACHE_DIR above). Kept out of
      # the bind-mounted host tree so the ONNX blob never lands in the repo.
      - fastembed_cache:/app/.fastembed_cache
    # The image's HEALTHCHECK curls :8000/health, but the scheduler is a worker
    # loop — it serves no HTTP, so that probe would always fail and show a scary
    # (but false) "unhealthy". Disable it; the scheduler's health is its logs.
    healthcheck:
      disable: true
    command: python -m backend.scheduler

  # The React/Vite frontend — the actual demo UI. Runs the Vite dev server and
  # proxies /api to the api container (VITE_API_TARGET=http://api:8000), so the
  # friend just opens http://localhost:5173. node_modules lives in an anonymous
  # volume so the container's install isn't shadowed by (or written back to) the
  # host tree — the bind mount still gives live hot-reload on source edits.
  web:
    image: node:20-alpine
    working_dir: /web
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://api:8000
    depends_on:
      - api
    volumes:
      - ./web:/web
      - web_node_modules:/web/node_modules
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      # pgadmin4 rejects reserved TLDs like .local as invalid emails and exits 1;
      # use a normal domain so the container actually starts.
      PGADMIN_DEFAULT_EMAIL: admin@narrative.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  web_node_modules:
  fastembed_cache:
